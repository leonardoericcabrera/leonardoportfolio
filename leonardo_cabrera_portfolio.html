<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leonardo Cabrera — Translation & Localization Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral: #e8522a;
    --coral-lt: #fff0eb;
    --teal: #1a7f74;
    --teal-lt: #e0f5f2;
    --amber: #d97706;
    --amber-lt: #fef3c7;
    --blue: #2563eb;
    --blue-lt: #eff6ff;
    --pink: #c026d3;
    --pink-lt: #fdf4ff;
    --text: #1c1917;
    --muted: #6b7280;
    --border: #e5e7eb;
    --bg: #fafaf9;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(250,250,249,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-family: 'Fraunces', serif; font-size: 1.15rem; font-weight: 700; color: var(--coral); letter-spacing: -0.01em; }
  .nav-links { display: flex; gap: 1.5rem; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.875rem; font-weight: 500; color: var(--muted); transition: color 0.2s; }
  .nav-links a:hover { color: var(--coral); }

  /* HERO */
  .hero {
    position: relative; overflow: hidden;
    min-height: 520px;
  }
  .hero-banner {
    width: 100%; height: 340px; object-fit: cover; object-position: center 60%;
    display: block;
  }
  .hero-banner-overlay {
    position: absolute; top: 0; left: 0; right: 0; height: 340px;
    background: linear-gradient(to bottom, rgba(28,25,23,0.15) 0%, rgba(28,25,23,0.55) 100%);
  }
  .hero-card {
    position: relative;
    max-width: 860px; margin: 0 auto;
    padding: 0 2rem;
    margin-top: -110px;
  }
  .hero-inner {
    background: #fff;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    padding: 2rem 2.5rem;
    display: flex; gap: 2rem; align-items: flex-start;
    box-shadow: 0 4px 32px rgba(0,0,0,0.08);
  }
  .hero-photo {
    width: 110px; height: 110px; border-radius: 50%;
    object-fit: cover; object-position: center top;
    border: 4px solid #fff;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
    flex-shrink: 0;
    margin-top: -3rem;
  }
  .hero-info { flex: 1; }
  .hero-name {
    font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 700;
    line-height: 1.1; color: var(--text); margin-bottom: 0.25rem;
  }
  .hero-name span { color: var(--coral); }
  .hero-role { font-size: 0.95rem; color: var(--muted); margin-bottom: 0.75rem; font-weight: 500; }
  .hero-tagline {
    font-family: 'Fraunces', serif; font-style: italic;
    font-size: 1.05rem; color: #44403c; line-height: 1.5;
    border-left: 3px solid var(--coral); padding-left: 1rem;
    margin-bottom: 1rem;
  }
  .hero-lang-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1rem; }
  .lang-pill {
    font-size: 0.72rem; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; letter-spacing: 0.03em;
  }
  .lp-es { background: #fef9c3; color: #854d0e; }
  .lp-en { background: #dbeafe; color: #1e40af; }
  .lp-kek { background: #dcfce7; color: #166534; }
  .lp-ar { background: #ede9fe; color: #5b21b6; }
  .lp-gn { background: #fce7f3; color: #9d174d; }
  .lp-fa { background: #ffedd5; color: #9a3412; }
  .hero-contacts { display: flex; gap: 1rem; flex-wrap: wrap; }
  .hero-contact-link {
    font-size: 0.8rem; font-weight: 500; color: var(--muted);
    text-decoration: none; display: flex; align-items: center; gap: 4px;
    transition: color 0.2s;
  }
  .hero-contact-link:hover { color: var(--coral); }

  /* STATS */
  .stats-section { max-width: 860px; margin: 1.5rem auto; padding: 0 2rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-box {
    background: #fff; border-radius: 14px; border: 1.5px solid var(--border);
    padding: 1rem 1.25rem; text-align: center;
    transition: transform 0.15s, border-color 0.15s;
  }
  .stat-box:hover { transform: translateY(-2px); border-color: var(--coral); }
  .stat-num { font-family: 'Fraunces', serif; font-size: 1.9rem; font-weight: 700; color: var(--coral); line-height: 1; }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; font-weight: 500; }

  /* MAIN LAYOUT */
  .main { max-width: 860px; margin: 0 auto; padding: 0 2rem 4rem; }
  .two-col { display: grid; grid-template-columns: 1fr 300px; gap: 1.5rem; align-items: start; }

  /* SECTION HEADING */
  .section-heading {
    font-family: 'Fraunces', serif; font-size: 1.25rem; font-weight: 700;
    color: var(--text); margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .section-heading::after {
    content: ''; flex: 1; height: 1.5px; background: var(--border);
  }

  /* EXPERIENCE */
  .exp-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 1.5rem; }
  .exp-card {
    background: #fff; border-radius: 14px; border: 1.5px solid var(--border);
    padding: 1.25rem 1.5rem; position: relative; overflow: hidden;
    transition: box-shadow 0.2s;
  }
  .exp-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .exp-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; background: var(--accent, var(--coral));
  }
  .exp-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; flex-wrap: wrap; }
  .exp-title { font-weight: 600; font-size: 0.95rem; color: var(--text); }
  .exp-company { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }
  .exp-date {
    font-size: 0.72rem; font-weight: 600; padding: 3px 10px;
    border-radius: 20px; background: var(--coral-lt); color: var(--coral);
    white-space: nowrap; flex-shrink: 0;
  }
  .exp-bullets { margin-top: 0.75rem; padding-left: 1rem; }
  .exp-bullets li { font-size: 0.82rem; color: #44403c; margin-bottom: 3px; line-height: 1.5; }

  /* TOOLS SIDEBAR */
  .sidebar-card {
    background: #fff; border-radius: 14px; border: 1.5px solid var(--border);
    padding: 1.25rem 1.5rem; margin-bottom: 1rem;
  }
  .tool-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .tool-chip {
    font-size: 0.72rem; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; border: 1.5px solid transparent;
  }
  .tc-a { background: var(--coral-lt); color: var(--coral); border-color: #fdc5b0; }
  .tc-b { background: var(--teal-lt); color: var(--teal); border-color: #99d9d3; }
  .tc-c { background: var(--amber-lt); color: var(--amber); border-color: #fcd34d; }
  .tc-d { background: var(--blue-lt); color: var(--blue); border-color: #bfdbfe; }
  .tc-e { background: var(--pink-lt); color: var(--pink); border-color: #e879f9; }

  .edu-item { margin-bottom: 0.85rem; }
  .edu-school { font-weight: 600; font-size: 0.85rem; color: var(--text); }
  .edu-degree { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
  .edu-date { font-size: 0.7rem; color: var(--coral); font-weight: 600; margin-top: 2px; }

  /* CONTACT FOOTER */
  .contact-footer {
    background: #1c1917; border-radius: 20px;
    padding: 2rem 2.5rem; margin-top: 2rem;
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .cf-left {}
  .cf-title { font-family: 'Fraunces', serif; font-size: 1.4rem; font-style: italic; color: #fef3c7; margin-bottom: 0.25rem; }
  .cf-sub { font-size: 0.8rem; color: #a8a29e; }
  .cf-links { display: flex; gap: 10px; flex-wrap: wrap; }
  .cf-btn {
    padding: 0.55rem 1.25rem; border-radius: 20px; font-size: 0.82rem;
    font-weight: 600; text-decoration: none; transition: opacity 0.2s;
  }
  .cf-btn:hover { opacity: 0.85; }
  .cf-main { background: var(--coral); color: #fff; }
  .cf-sec { background: #292524; color: #e7e5e4; }

  @media (max-width: 680px) {
    .two-col { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .hero-inner { flex-direction: column; gap: 1rem; }
    .hero-photo { margin-top: -4rem; align-self: center; }
  }
</style>
</head>
